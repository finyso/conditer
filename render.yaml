services:
  - type: web
    name: confectionery
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn confectionery.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: confectionery_db
          property: connectionString
      - key: PRODUCTION
        value: True
      - key: SECRET_KEY
        generateValue: true