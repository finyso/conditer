{% extends 'shop/base.html' %}

{% block title %}📝 Регистрация | Сладкая жизнь{% endblock %}

{% block extra_css %}
<style>
    .register-container {
        max-width: 600px;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .register-container h2 {
        text-align: center;
        color: #2d1810;
        margin-bottom: 30px;
    }
    form p {
        margin-bottom: 15px;
    }
    form label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #4a2a1a;
    }
    form input, form select, form textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
    }
    button {
        width: 100%;
        background: #ff9800;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover {
        background: #e68900;
    }
    .help-text {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
    }
    .errorlist {
        color: #dc3545;
        list-style: none;
        font-size: 12px;
        margin-top: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="register-container">
    <h2>📝 Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зарегистрироваться</button>
    </form>
</div>
{% endblock %}
